services:
  db:
    image: postgis/postgis:17-3.4-alpine
    container_name: tfms-postgres
    environment:
      POSTGRES_USER: tfms
      POSTGRES_PASSWORD: tfms
      POSTGRES_DB: tfms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: tfms-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: tfms
      MINIO_ROOT_PASSWORD: tfms-minio-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
