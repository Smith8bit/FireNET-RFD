# FireNET on the Traefik-routed host. Traefik (compose project "wildfire") owns
# 80/443 and routes by container labels on the external `wildfire_default` network,
# TLS via the `letsencrypt` resolver. FireNET joins that network for routing and
# keeps db/minio on a private `internal` network (no host ports).
#
#   cp .env.example .env   # POSTGRES_PASSWORD, MINIO_ROOT_PASSWORD
#   docker compose -f compose.yaml up -d --build
services:
  db:
    image: postgis/postgis:17-3.4-alpine
    container_name: firenet-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-firenet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-firenet}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-firenet}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: firenet-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-firenet}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    networks: [internal]

  api:
    build: ../backend
    container_name: firenet-api
    env_file: ../backend/.env
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks: [internal, edge]
    # mount the FCM key in at a fixed path (FCM_CREDENTIALS_FILE in .env must match)
    volumes:
      - ../backend/tfms-fcm-firebase-adminsdk-fbsvc-8bd030a43a.json:/secrets/fcm.json:ro
      # published Android APKs + manifest, served read-only by /app/android/*.
      # Drop new builds here on the host (publish-apk.ps1) — no image rebuild needed.
      - ../backend/app_releases:/app/app_releases:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=wildfire_default"
      - "traefik.http.routers.firenet-api.rule=Host(`wildfire.forest.go.th`) && PathPrefix(`/firenet/api`)"
      - "traefik.http.routers.firenet-api.priority=100"
      - "traefik.http.routers.firenet-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.firenet-api.middlewares=firenet-api-strip"
      - "traefik.http.middlewares.firenet-api-strip.stripprefix.prefixes=/firenet/api"
      - "traefik.http.services.firenet-api.loadbalancer.server.port=8000"

  web:
    image: nginx:alpine
    container_name: firenet-web
    restart: unless-stopped
    volumes:
      - ../web/dist:/usr/share/nginx/html:ro
      - ./firenet-web.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [edge]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=wildfire_default"
      - "traefik.http.routers.firenet-web.rule=Host(`wildfire.forest.go.th`) && PathPrefix(`/firenet`)"
      - "traefik.http.routers.firenet-web.priority=50"
      - "traefik.http.routers.firenet-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.firenet-web.middlewares=firenet-web-strip"
      - "traefik.http.middlewares.firenet-web-strip.stripprefix.prefixes=/firenet"
      - "traefik.http.services.firenet-web.loadbalancer.server.port=80"

volumes:
  pgdata:
  miniodata:

networks:
  internal:
  edge:
    external: true
    name: wildfire_default
